services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: drivecleaner
      POSTGRES_PASSWORD: drivecleaner
      POSTGRES_DB: drive_cleaner
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drivecleaner"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://drivecleaner:drivecleaner@db:5432/drive_cleaner
    ports:
      - "8811:8811"
    volumes:
      - ./backend/reports:/app/reports
      # Mount the real drive/folder you want to scan into the container so
      # the backend can see it. Change the left side of this line to the
      # actual path on your machine you want to be able to scan.
      # Example (Windows): - C:/Users/you:/data:ro
      # Example (Linux/Mac): - /home/you:/data:ro
      - ${SCAN_MOUNT:-./}:/data:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5175:80"
    depends_on:
      - backend

volumes:
  pgdata:
